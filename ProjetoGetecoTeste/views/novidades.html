<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GETECO - Infraestrutura</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/png" href="/images/logo.png">
</head>

<body>
  <header>
    <nav class="navbar">
      <a href="/" class="logo" aria-label="Ir para a página inicial">
        <img src="/images/logo.png" alt="GETECO - Início" class="site-logo">
      </a>
      <ul class="nav-links">
        <li><a href="/sobre">História</a></li>
        <li><a href="/cursos">Cursos</a></li>
        <li><a href="/docente">Docentes</a></li>
        <li><a href="/contato">Contato</a></li>
        <li><a href="/alunos">Calendário</a></li>
        <li><a href="/responsaveis">Biblioteca</a></li>
        <li><a href="/novidades" class="active">Infraestrutura</a></li>
      </ul>
    </nav>
  </header>

  <section class="section">
    <h2>Infraestrutura e Novidades</h2>
    <div id="novidades-content" class="cards-grid">A carregar...</div>
  </section>

  <footer></footer>

  <!-- POPUP -->
  <div id="popup-overlay" class="popup-overlay" role="dialog" aria-modal="true" aria-labelledby="popup-titulo">
    <div class="popup-box">
      <button class="popup-close" id="popup-close" aria-label="Fechar">&times;</button>
      <img id="popup-img" src="" alt="" class="popup-img" style="display:none">
      <div class="popup-body">
        <span class="popup-badge">Novidade</span>
        <h2 id="popup-titulo"></h2>
        <p id="popup-conteudo"></p>
      </div>
    </div>
  </div>

  <script>
    const overlay = document.getElementById('popup-overlay');
    const pImg = document.getElementById('popup-img');
    const pTitulo = document.getElementById('popup-titulo');
    const pConteudo = document.getElementById('popup-conteudo');

    function abrirPopup(titulo, conteudo, imgSrc) {
      pTitulo.textContent = titulo;
      pConteudo.textContent = conteudo;
      if (imgSrc) { pImg.src = imgSrc; pImg.style.display = 'block'; }
      else { pImg.src = ''; pImg.style.display = 'none'; }
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function fecharPopup() { overlay.classList.remove('active'); document.body.style.overflow = ''; }

    document.getElementById('popup-close').addEventListener('click', fecharPopup);
    overlay.addEventListener('click', e => { if (e.target === overlay) fecharPopup(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') fecharPopup(); });

    fetch(`/api/novidades`)
      .then(res => { if (!res.ok) throw new Error(res.status); return res.json(); })
      .then(data => {
        const container = document.getElementById('novidades-content');
        if (!Array.isArray(data) || data.length === 0) {
          container.innerHTML = '<p>Nenhuma novidade registada.</p>'; return;
        }
        data.sort((a, b) => {
          const toMs = ts => ts
            ? (ts.seconds ? ts.seconds * 1000 : ts._seconds ? ts._seconds * 1000 : new Date(ts).getTime())
            : 0;
          return toMs(b.data) - toMs(a.data);
        });
        container.innerHTML = '';
        // Escapa HTML para prevenir XSS
        function escapeHtml(str) {
          if (!str) return '';
          return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        data.forEach(n => {
          let imgSrc = n.imagem || '';
          const card = document.createElement('div');
          card.className = 'news-card';
          card.setAttribute('role', 'button');
          card.setAttribute('tabindex', '0');
          card.innerHTML = `
            ${imgSrc ? `<div class="news-card-img"><img src="${escapeHtml(imgSrc)}" alt="${escapeHtml(n.titulo)}"></div>` : '<div class="news-card-img news-card-img--placeholder"><span>🏫</span></div>'}
            <div class="news-card-body">
              <span class="news-card-badge">Novidade</span>
              <h3 class="news-card-title">${escapeHtml(n.titulo)}</h3>
              <p class="news-card-excerpt">${escapeHtml(n.conteudo)}</p>
              <span class="news-card-cta">Ver mais →</span>
            </div>`;
          card.addEventListener('click', () => abrirPopup(n.titulo, n.conteudo, imgSrc));
          card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); abrirPopup(n.titulo, n.conteudo, imgSrc); } });
          container.appendChild(card);
        });
      })
      .catch(() => { document.getElementById('novidades-content').innerHTML = '<p>Não foi possível carregar as novidades.</p>'; });
  </script>
  <script src="/js/main.js"></script>
</body>

</html>
