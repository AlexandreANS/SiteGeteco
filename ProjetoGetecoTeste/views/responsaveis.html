<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>GETECO - Responsáveis</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/png" href="/images/logo.png">
</head>
<body>
  <header>
    <nav class="navbar">
      <a href="/" class="logo" aria-label="Ir para a página inicial">
        <img src="/images/logo.png" alt="GETECO - Início" class="site-logo">
      </a>
      <ul class="nav-links">
        <li><a href="/sobre">História</a></li>
        <li><a href="/cursos">Cursos</a></li>
        <li><a href="/docente">Docentes</a></li>
        <li><a href="/contato">Contato</a></li>
        <li><a href="/alunos">Alunos</a></li>
        <li><a href="/responsaveis" class="active">Responsáveis</a></li>
        <li><a href="/novidades">Infraestrutura</a></li>
      </ul>
    </nav>
  </header>

  <section class="section">
    <h2>Informações para Responsáveis</h2>
    <p style="text-align:center;color:var(--texto-suave,#6b7280);max-width:600px;margin:0 auto 2.5rem;">
      Acompanhe aqui as datas de reuniões e entregas de documentos importantes.
    </p>
    <div id="responsaveis-content">
      <div style="text-align:center;color:var(--texto-suave,#6b7280)">Carregando informações...</div>
    </div>
  </section>

  <footer></footer>

  <script>
    // ✅ CORRIGIDO: usa /api/responsaveis (proxy repassa ao admin-server)
    fetch(`/api/responsaveis`)
      .then(res => { if (!res.ok) throw new Error(res.status); return res.json(); })
      .then(data => {
        const container = document.getElementById('responsaveis-content');
        if (!data || Object.keys(data).length === 0) {
          container.innerHTML = '<p style="text-align:center">Nenhuma informação registada para os responsáveis.</p>'; return;
        }
        const grid = document.createElement('div');
        grid.className = 'info-grid';
        const campos = [
          { key: 'reuniaoPais', titulo: 'Reunião de Pais', icon: '👨‍👩‍👧' },
          { key: 'entregaBoletins', titulo: 'Entrega de Boletins', icon: '📋' },
        ];
        campos.forEach(c => {
          const box = document.createElement('div');
          box.className = 'info-box';
          box.innerHTML = `
            <span class="info-box-icon">${c.icon}</span>
            <span class="info-title">${c.titulo}</span>
            <span class="info-value">${data[c.key] || 'A definir'}</span>`;
          grid.appendChild(box);
        });
        container.innerHTML = '';
        container.appendChild(grid);
      })
      .catch(() => {
        document.getElementById('responsaveis-content').innerHTML =
          '<p style="text-align:center">Não foi possível carregar as informações.</p>';
      });
  </script>

  <script src="/js/main.js"></script>
</body>
</html>
