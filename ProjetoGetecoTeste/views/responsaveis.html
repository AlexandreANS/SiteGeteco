<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GETECO - Biblioteca</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/png" href="/images/logo.png">
  <style>
    .bib-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.25rem;
      max-width: 1000px;
      margin: 0 auto;
    }
    .bib-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 1.25rem 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      transition: box-shadow 0.2s;
    }
    .bib-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .bib-card-icon { font-size: 1.75rem; margin-bottom: 0.25rem; }
    .bib-card-titulo {
      font-weight: 700;
      font-size: 1rem;
      color: var(--cor-texto, #111827);
      line-height: 1.3;
    }
    .bib-card-autor {
      font-size: 0.875rem;
      color: var(--texto-suave, #6b7280);
    }
    .bib-card-codigo {
      font-size: 0.78rem;
      color: #9ca3af;
    }
    .bib-badge {
      display: inline-block;
      margin-top: 0.6rem;
      padding: 3px 10px;
      border-radius: 9999px;
      font-size: 0.78rem;
      font-weight: 600;
      width: fit-content;
    }
    .bib-badge.disponivel {
      background: #d1fae5;
      color: #065f46;
    }
    .bib-badge.emprestado {
      background: #fee2e2;
      color: #991b1b;
    }
    .bib-filtros {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 1.75rem;
      flex-wrap: wrap;
    }
    .bib-filtro-btn {
      padding: 0.45rem 1.25rem;
      border: 2px solid transparent;
      border-radius: 999px;
      background: #f3f4f6;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      color: var(--texto-suave, #6b7280);
      transition: all 0.2s;
    }
    .bib-filtro-btn:hover,
    .bib-filtro-btn.active {
      background: var(--cor-primaria, #1d4ed8);
      color: #fff;
      border-color: var(--cor-primaria, #1d4ed8);
    }
    .bib-busca {
      display: block;
      max-width: 400px;
      margin: 0 auto 1.5rem;
      padding: 0.55rem 1rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      width: 100%;
      box-sizing: border-box;
    }
    .bib-busca:focus {
      outline: none;
      border-color: var(--cor-primaria, #1d4ed8);
      box-shadow: 0 0 0 3px rgba(29,78,216,0.1);
    }
    .bib-vazio {
      text-align: center;
      color: var(--texto-suave, #6b7280);
      padding: 3rem 0;
      grid-column: 1 / -1;
    }
  </style>
</head>
<body>
  <header>
    <nav class="navbar">
      <a href="/" class="logo" aria-label="Ir para a página inicial">
        <img src="/images/logo.png" alt="GETECO - Início" class="site-logo">
      </a>
      <ul class="nav-links">
        <li><a href="/sobre">História</a></li>
        <li><a href="/cursos">Cursos</a></li>
        <li><a href="/docente">Docentes</a></li>
        <li><a href="/contato">Contato</a></li>
        <li><a href="/alunos">Calendário</a></li>
        <li><a href="/responsaveis" class="active">Biblioteca</a></li>
        <li><a href="/novidades">Infraestrutura</a></li>
      </ul>
    </nav>
  </header>

  <section class="section">
    <h2>Acervo da Biblioteca</h2>
    <p style="text-align:center;color:var(--texto-suave,#6b7280);max-width:600px;margin:0 auto 2rem;">
      Consulte os livros disponíveis e veja quais estão emprestados no momento.
    </p>

    <input
      type="text"
      id="bib-busca"
      class="bib-busca"
      placeholder="🔍  Buscar por título ou autor..."
      aria-label="Buscar livros"
    >

    <div class="bib-filtros" role="group" aria-label="Filtrar acervo">
      <button class="bib-filtro-btn active" data-filtro="todos">Todos</button>
      <button class="bib-filtro-btn" data-filtro="disponivel">Disponíveis</button>
      <button class="bib-filtro-btn" data-filtro="emprestado">Emprestados</button>
    </div>

    <div id="bib-container">
      <div style="text-align:center;color:var(--texto-suave,#6b7280);padding:3rem 0">
        Carregando acervo...
      </div>
    </div>
  </section>

  <footer></footer>

  <script>
    let todosLivros = [];
    let filtroAtivo = 'todos';
    let buscaAtiva  = '';

    function renderizarLivros() {
      const container = document.getElementById('bib-container');

      const filtrados = todosLivros.filter(livro => {
        const okFiltro =
          filtroAtivo === 'todos' ||
          (filtroAtivo === 'disponivel' && !livro.emprestado) ||
          (filtroAtivo === 'emprestado' && livro.emprestado);

        const q = buscaAtiva.toLowerCase();
        const okBusca =
          !q ||
          (livro.nome  || '').toLowerCase().includes(q) ||
          (livro.autor || '').toLowerCase().includes(q);

        return okFiltro && okBusca;
      });

      if (!filtrados.length) {
        container.innerHTML = '<div class="bib-grid"><p class="bib-vazio">Nenhum livro encontrado.</p></div>';
        return;
      }

      // Escapa HTML para prevenir XSS
      function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
      }

      container.innerHTML = `<div class="bib-grid">
        ${filtrados.map(livro => {
          const disponivel = !livro.emprestado;
          return `
            <div class="bib-card">
              <span class="bib-card-icon">${disponivel ? '📗' : '📕'}</span>
              <span class="bib-card-titulo">${escapeHtml(livro.nome) || '—'}</span>
              <span class="bib-card-autor">${escapeHtml(livro.autor) || '—'}</span>
              ${livro.codigo ? `<span class="bib-card-codigo">Cód. ${escapeHtml(livro.codigo)}</span>` : ''}
              <span class="bib-badge ${disponivel ? 'disponivel' : 'emprestado'}">
                ${disponivel ? '✓ Disponível' : '✗ Emprestado'}
              </span>
            </div>`;
        }).join('')}
      </div>`;
    }

    // Carregar livros
    fetch('/api/livros')
      .then(res => { if (!res.ok) throw new Error(res.status); return res.json(); })
      .then(data => {
        todosLivros = data;
        renderizarLivros();
      })
      .catch(() => {
        document.getElementById('bib-container').innerHTML =
          '<p style="text-align:center;color:var(--texto-suave,#6b7280)">Não foi possível carregar o acervo.</p>';
      });

    // Filtros de disponibilidade
    document.querySelectorAll('.bib-filtro-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.bib-filtro-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filtroAtivo = btn.dataset.filtro;
        renderizarLivros();
      });
    });

    // Busca por título/autor
    document.getElementById('bib-busca').addEventListener('input', e => {
      buscaAtiva = e.target.value;
      renderizarLivros();
    });
  </script>

  <script src="/js/main.js"></script>
</body>
</html>
