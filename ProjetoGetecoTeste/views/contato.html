<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>GETECO - Contato</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/png" href="/images/logo.png">
</head>

<body>
  <header>
    <nav class="navbar">
      <a href="/" class="logo" aria-label="Ir para a página inicial">
        <img src="/images/logo.png" alt="GETECO - Início" class="site-logo">
      </a>
      <ul class="nav-links">
        <li><a href="/sobre">História</a></li>
        <li><a href="/cursos">Cursos</a></li>
        <li><a href="/docente">Docentes</a></li>
        <li><a href="/contato" class="active">Contato</a></li>
        <li><a href="/alunos">Alunos</a></li>
        <li><a href="/responsaveis">Responsáveis</a></li>
        <li><a href="/novidades">Infraestrutura</a></li>
      </ul>
    </nav>
  </header>

  <section class="section">
    <h2>Nossos Contatos</h2>
    <p style="text-align:center;color:var(--texto-suave,#6b7280);margin-bottom:2rem;">
      Entre em contacto com a equipa do GETECO.
    </p>
    <div id="contatos-content" class="contact-grid">Carregando...</div>
  </section>

  <footer></footer>

  <script>
    const API_HOST = window.location.hostname;
    const API_PORT = 3000;

    fetch(`http://${API_HOST}:${API_PORT}/api/contato`)
      .then(res => { if (!res.ok) throw new Error(res.status); return res.json(); })
      .then(data => {
        const container = document.getElementById('contatos-content');
        if (!Array.isArray(data) || data.length === 0) {
          container.innerHTML = '<p>Nenhum contato cadastrado.</p>'; return;
        }
        container.innerHTML = '';
        data.forEach(c => {
          const card = document.createElement('div');
          card.className = 'contact-card';
          const nome = document.createElement('div');
          nome.className = 'contact-name';
          nome.textContent = c.nome || 'Sem nome';
          const emailWrap = document.createElement('a');
          emailWrap.className = 'contact-email';
          emailWrap.href = `mailto:${c.email}`;
          emailWrap.textContent = c.email || 'Sem e-mail';
          card.appendChild(nome);
          card.appendChild(emailWrap);
          container.appendChild(card);
        });
      })
      .catch(() => {
        document.getElementById('contatos-content').innerHTML =
          '<p>Não foi possível carregar os contatos.</p>';
      });
  </script>

  <script src="/js/main.js"></script>
</body>

</html>
