<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>GETECO</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/png" href="/images/logo.png">
</head>
<body>
  <header>
    <nav class="navbar">
  <a href="/" class="logo" aria-label="Ir para a página inicial"><img src="/images/logo.png" alt="GETECO - Início" class="site-logo"></a>
  
      
      
      <ul class="nav-links">
        <li><a href="/sobre">História</a></li>
        <li><a href="/cursos">Cursos</a></li>
        <li><a href="/docente">Docentes</a></li>
        <li><a href="/contato">Contato</a></li>
        <li><a href="/alunos">Alunos</a></li>
        <li><a href="/responsaveis">Responsáveis</a></li>
        <li><a href="/novidades">Infraestrutura</a></li>
      </ul>
    </nav>
  </header>

<section class="section">
    <h2>Notícias da Escola</h2>
    <div id="noticias-content">A carregar...</div>
</section>

<footer></footer>

<script>
    // ====================================================================
    // ✅ CORREÇÃO 1: Usar hostname dinâmico (não localhost)
    // ====================================================================
    // ANTES: fetch(`http://localhost:3000/api/noticias`)
    // DEPOIS:
    const API_HOST = window.location.hostname;
    const API_PORT = 3000;
    
    fetch(`http://${API_HOST}:${API_PORT}/api/noticias`)
      .then(res => {
        // ✅ CORREÇÃO 2: Validar resposta
        if (!res.ok) {
          throw new Error(`Erro ${res.status}: Não foi possível carregar as notícias`);
        }
        return res.json();
      })
      .then(data => {
        const container = document.getElementById('noticias-content');
        
        // ✅ CORREÇÃO 3: Validar se dados é um array
        if (Array.isArray(data) && data.length > 0) {
          container.innerHTML = '';
          
          data.forEach(noticia => {
            const card = document.createElement('div');
            card.className = 'content-card';
            let imagemHTML = '';
            
            // ✅ CORREÇÃO 4: Ajustar URL de imagem para o hostname dinâmico
            if (noticia.imagem) {
              try {
                const imgUrl = new URL(noticia.imagem);
                imgUrl.hostname = API_HOST;  // Usa o mesmo hostname
                imagemHTML = `<img src="${imgUrl.href}" alt="${noticia.titulo}" class="noticia-imagem">`;
              } catch (e) {
                console.error('URL de imagem inválida:', noticia.imagem);
              }
            }
            
            // ✅ CORREÇÃO 5: Escape de HTML para evitar XSS
            const titulo = document.createElement('h3');
            titulo.textContent = noticia.titulo;
            
            const conteudo = document.createElement('p');
            conteudo.textContent = noticia.conteudo;
            
            card.innerHTML = imagemHTML;
            card.appendChild(titulo);
            card.appendChild(conteudo);
            
            container.appendChild(card);
          });
        } else {
          container.innerHTML = "<p>Nenhuma notícia registada.</p>";
        }
      })
      .catch((error) => {
        console.error("❌ Erro ao carregar notícias:", error);
        document.getElementById('noticias-content').innerHTML = 
          "<p>Não foi possível carregar as notícias. Verifique se o servidor admin está online.</p>";
      });
</script>
<script src="/js/main.js"></script>
</body>
</html>
