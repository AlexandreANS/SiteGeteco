<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Postagem</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/png" href="/images/watermark.png">
</head>

<body>
    <div class="container">
        <h2>Editar Postagem</h2>
        <div id="statusMessage" style="display: none; margin-bottom: 1rem; padding: 1rem; border-radius: 4px;"></div>

        <form id="editForm">
            <div class="input-group">
                <label for="title">Título:</label>
                <input type="text" id="title" name="title" required>
            </div>
            <div class="input-group">
                <label for="content">Conteúdo:</label>
                <textarea id="content" name="content" required></textarea>
            </div>
            <button type="submit">Salvar Alterações</button>
        </form>
    </div>

    <script>
        // ====================================================================
        // ✅ CORREÇÃO: Usar API REST ao invés de EJS templates
        // ====================================================================

        const API_HOST = window.location.hostname;
        const API_PORT = 3000;
        const API_URL = `http://${API_HOST}:${API_PORT}/api`;

        // Pegar ID da postagem da URL
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        if (!postId) {
            document.body.innerHTML = '<p style="text-align: center; margin-top: 2rem; color: red;">Erro: ID da postagem não encontrado.</p>';
            throw new Error('Post ID não fornecido');
        }

        // Carregar dados da postagem
        async function carregarPostagem() {
            try {
                const response = await fetch(`${API_URL}/novidades/${postId}`);

                if (!response.ok) {
                    throw new Error(`Erro ${response.status}: Postagem não encontrada`);
                }

                const post = await response.json();

                // ✅ Preencher formulário com dados carregados
                document.getElementById('title').value = post.titulo || '';
                document.getElementById('content').value = post.conteudo || '';

            } catch (error) {
                console.error('❌ Erro ao carregar postagem:', error);
                showStatus('Erro ao carregar a postagem.', 'error');
            }
        }

        // Salvar alterações
        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const titulo = document.getElementById('title').value.trim();
            const conteudo = document.getElementById('content').value.trim();

            if (!titulo || !conteudo) {
                showStatus('Por favor, preencha todos os campos.', 'warning');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/novidades/${postId}`, {
                    method: 'PUT',  // ou 'PATCH'
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        titulo: titulo,
                        conteudo: conteudo
                    })
                });

                if (!response.ok) {
                    throw new Error(`Erro ${response.status}: Não foi possível salvar`);
                }

                showStatus('✅ Postagem atualizada com sucesso!', 'success');

                // Redirecionar após 2 segundos
                setTimeout(() => {
                    window.location.assign('/dashboard');
                }, 2000);

            } catch (error) {
                console.error('❌ Erro ao salvar:', error);
                showStatus('Erro ao salvar a postagem: ' + error.message, 'error');
            }
        });

        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.textContent = message;
            statusDiv.style.display = 'block';

            if (type === 'success') {
                statusDiv.style.backgroundColor = '#d4edda';
                statusDiv.style.color = '#155724';
            } else if (type === 'error') {
                statusDiv.style.backgroundColor = '#f8d7da';
                statusDiv.style.color = '#721c24';
            } else if (type === 'warning') {
                statusDiv.style.backgroundColor = '#fff3cd';
                statusDiv.style.color = '#856404';
            }
        }

        // Carregar postagem ao abrir página
        carregarPostagem();
    </script>
</body>

</html>
