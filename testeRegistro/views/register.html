<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registo - Painel Administrativo GETECO</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/png" href="/images/logo.png">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <img src="/images/logo.png" alt="Logo GETECO" class="login-logo">
            <h2>Criar Nova Conta</h2>
            <p>Preencha os dados para solicitar acesso ao painel.</p>
            
            <div id="errorMessage" style="color: red; display: none; margin-bottom: 1rem;"></div>
            <div id="successMessage" style="color: green; display: none; margin-bottom: 1rem;"></div>
            
            <form id="registerForm">
                <div class="input-group">
                    <label for="username">Nome de Utilizador (E-mail):</label>
                    <input type="email" id="username" name="username" required autocomplete="email">
                </div>
                <div class="input-group">
                    <label for="password">Senha:</label>
                    <input type="password" id="password" name="password" required autocomplete="new-password" minlength="6">
                    <small>Mínimo 6 caracteres</small>
                </div>
                <div class="input-group">
                    <label for="confirmPassword">Confirme a Senha:</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password" minlength="6">
                </div>
                <button type="submit" class="btn-submit">Registar</button>
            </form>
            
            <div class="login-footer">
                <p>Já tem uma conta? <a href="/login">Faça login</a></p>
            </div>
        </div>
    </div>

    <!-- Apenas o SDK do Firebase, mas NÃO será usado para criar usuário -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <script>
        // O formulário envia e‑mail e senha diretamente para o servidor
        document.getElementById('registerForm').addEventListener('submit', handleRegister);

        async function handleRegister(e) {
            e.preventDefault();
            const email = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validações básicas no cliente
            if (!email || !password || !confirmPassword) {
                showError('Por favor, preencha todos os campos.');
                return;
            }
            if (password.length < 6) {
                showError('A senha deve ter pelo menos 6 caracteres.');
                return;
            }
            if (password !== confirmPassword) {
                showError('As senhas não coincidem!');
                return;
            }
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('Por favor, insira um e‑mail válido.');
                return;
            }

            const btn = document.querySelector('#registerForm button');
            btn.disabled = true;
            btn.textContent = 'A processar...';

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Erro ao registar.');
                }

                showSuccess('✅ Conta criada com sucesso! Verifique seu e‑mail para confirmar o endereço. Após a verificação, aguarde a aprovação do administrador.');
                setTimeout(() => window.location.assign('/login'), 5000);
            } catch (error) {
                console.error('❌ Erro de registro:', error);
                showError(error.message || 'Erro ao criar a conta. Tente novamente.');
                btn.disabled = false;
                btn.textContent = 'Registar';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            successDiv.style.display = 'none';
            setTimeout(() => errorDiv.style.display = 'none', 6000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            const errorDiv = document.getElementById('errorMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            errorDiv.style.display = 'none';
        }
    </script>
</body>
</html>
