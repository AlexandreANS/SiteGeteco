<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registo - Painel Administrativo GETECO</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/png" href="/images/watermark.png">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <img src="/images/watermark.png" alt="Logo GETECO" class="login-logo">
            <h2>Criar Nova Conta</h2>
            <p>Preencha os dados para solicitar acesso ao painel.</p>
            
            <div id="errorMessage" style="color: red; display: none; margin-bottom: 1rem;"></div>
            <div id="successMessage" style="color: green; display: none; margin-bottom: 1rem;"></div>
            
            <form id="registerForm">
                <div class="input-group">
                    <label for="username">Nome de Utilizador (E-mail):</label>
                    <input type="email" id="username" name="username" required autocomplete="email">
                </div>
                <div class="input-group">
                    <label for="password">Senha:</label>
                    <input type="password" id="password" name="password" required autocomplete="new-password" minlength="6">
                    <small>Mínimo 6 caracteres</small>
                </div>
                <div class="input-group">
                    <label for="confirmPassword">Confirme a Senha:</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password" minlength="6">
                </div>
                <button type="submit" class="btn-submit">Registar</button>
            </form>
            
            <div class="login-footer">
                <p>Já tem uma conta? <a href="/login">Faça login</a></p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <script>
        // Carrega a configuração do Firebase e inicializa o formulário
        fetch('/firebase-config.json')
          .then(res => res.json())
          .then(firebaseConfig => {
            firebase.initializeApp(firebaseConfig);
            document.getElementById('registerForm').addEventListener('submit', handleRegister);
          })
          .catch(err => {
            console.error('Erro ao carregar configuração Firebase:', err);
            showError('Erro ao carregar configuração do sistema.');
          });

        async function handleRegister(e) {
            e.preventDefault();
            const email = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validações
            if (!email || !password || !confirmPassword) {
                showError('Por favor, preencha todos os campos.');
                return;
            }
            if (password.length < 6) {
                showError('A senha deve ter pelo menos 6 caracteres.');
                return;
            }
            if (password !== confirmPassword) {
                showError('As senhas não coincidem!');
                return;
            }
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('Por favor, insira um e-mail válido.');
                return;
            }

            const btn = document.querySelector('#registerForm button');
            btn.disabled = true;
            btn.textContent = 'A processar...';

            try {
                // Criar usuário no Firebase
                const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Enviar e-mail de verificação
                await user.sendEmailVerification();

                // Enviar dados para o servidor
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        uid: user.uid,
                        timestamp: new Date().toISOString()
                    })
                });

                if (!response.ok) {
                    throw new Error('Erro ao registar no servidor.');
                }

                // Logout após registro
                await firebase.auth().signOut();

                showSuccess('✅ Conta criada com sucesso! Verifique seu e‑mail para confirmar o endereço. Após a verificação, aguarde a aprovação do administrador.');
                
                // Redirecionar após 5 segundos
                setTimeout(() => window.location.assign('/login'), 5000);

            } catch (error) {
                console.error('❌ Erro de registro:', error);
                
                let mensagem = 'Erro ao criar a conta. Tente novamente.';
                if (error.code === 'auth/email-already-in-use') {
                    mensagem = 'Este e-mail já está registado.';
                } else if (error.code === 'auth/invalid-email') {
                    mensagem = 'E-mail inválido.';
                } else if (error.code === 'auth/weak-password') {
                    mensagem = 'Senha muito fraca. Use pelo menos 6 caracteres.';
                } else if (error.message) {
                    mensagem = error.message;
                }
                
                showError(mensagem);
                btn.disabled = false;
                btn.textContent = 'Registar';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            successDiv.style.display = 'none';
            setTimeout(() => errorDiv.style.display = 'none', 6000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            const errorDiv = document.getElementById('errorMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            errorDiv.style.display = 'none';
        }
    </script>
</body>
</html>
