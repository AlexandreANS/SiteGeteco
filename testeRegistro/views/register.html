<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registo - Painel Administrativo GETECO</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/png" href="/images/logo.png">
    <style>
        /* Estilos específicos para registro (não conflitam com o style.css) */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-body, #f3f4f6);
            padding: 20px;
        }
        .login-box {
            background: var(--bg-card, #ffffff);
            border: 1px solid var(--border, #e5e7eb);
            border-radius: var(--radius, 12px);
            padding: 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow-lg, 0 10px 25px rgba(0,0,0,0.08));
            text-align: center;
        }
        .login-logo {
            max-width: 80px;
            margin-bottom: 1rem;
        }
        .login-box h2 {
            margin-bottom: 0.5rem;
            color: var(--txt-primary, #111827);
        }
        .login-box p {
            color: var(--txt-secondary, #6b7280);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--txt-secondary, #4b5563);
        }
        .input-group input {
            width: 100%;
            padding: 0.65rem 0.9rem;
            background: var(--bg-input, #f9fafb);
            border: 1px solid var(--border, #d1d5db);
            border-radius: var(--radius-sm, 6px);
            font-size: 0.95rem;
            color: var(--txt-primary, #111827);
            font-family: inherit;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }
        .input-group input:focus {
            border-color: var(--border-focus, #3b82f6);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .input-group small {
            display: block;
            color: var(--txt-muted, #9ca3af);
            font-size: 0.75rem;
            margin-top: 4px;
        }
        .btn-submit {
            width: 100%;
            padding: 0.75rem;
            background: var(--blue, #2563eb);
            color: white;
            border: none;
            border-radius: var(--radius-sm, 6px);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s ease;
            font-family: inherit;
        }
        .btn-submit:hover {
            background: var(--blue-dark, #1d4ed8);
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .login-footer {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--txt-secondary, #6b7280);
        }
        .login-footer a {
            color: var(--blue, #2563eb);
            text-decoration: none;
            font-weight: 600;
        }
        .login-footer a:hover {
            text-decoration: underline;
        }
        #errorMessage, #successMessage {
            padding: 0.75rem;
            border-radius: var(--radius-sm, 6px);
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        #errorMessage {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        #successMessage {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <img src="/images/logo.png" alt="Logo GETECO" class="login-logo">
            <h2>Criar Nova Conta</h2>
            <p>Preencha os dados para solicitar acesso ao painel.</p>
            
            <div id="errorMessage" style="display: none;"></div>
            <div id="successMessage" style="display: none;"></div>
            
            <form id="registerForm">
                <div class="input-group">
                    <label for="username">Nome de Utilizador (E-mail):</label>
                    <input type="email" id="username" name="username" required autocomplete="email">
                </div>
                <div class="input-group">
                    <label for="password">Senha:</label>
                    <input type="password" id="password" name="password" required autocomplete="new-password" minlength="6">
                    <small>Mínimo 6 caracteres</small>
                </div>
                <div class="input-group">
                    <label for="confirmPassword">Confirme a Senha:</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password" minlength="6">
                </div>
                <button type="submit" class="btn-submit">Registar</button>
            </form>
            
            <div class="login-footer">
                <p>Já tem uma conta? <a href="/login">Faça login</a></p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <script>
        // (código JavaScript completo – igual à versão anterior)
        fetch('/firebase-config.json')
          .then(res => res.json())
          .then(firebaseConfig => {
            firebase.initializeApp(firebaseConfig);
            document.getElementById('registerForm').addEventListener('submit', handleRegister);
          })
          .catch(err => {
            console.error('Erro ao carregar configuração Firebase:', err);
            showError('Erro ao carregar configuração do sistema.');
          });

        async function handleRegister(e) {
            e.preventDefault();
            const email = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!email || !password || !confirmPassword) {
                showError('Por favor, preencha todos os campos.');
                return;
            }
            if (password.length < 6) {
                showError('A senha deve ter pelo menos 6 caracteres.');
                return;
            }
            if (password !== confirmPassword) {
                showError('As senhas não coincidem!');
                return;
            }
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('Por favor, insira um e-mail válido.');
                return;
            }

            const btn = document.querySelector('#registerForm button');
            btn.disabled = true;
            btn.textContent = 'A processar...';

            try {
                const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                await user.sendEmailVerification();

                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        uid: user.uid,
                        timestamp: new Date().toISOString()
                    })
                });

                if (!response.ok) {
                    throw new Error('Erro ao registar no servidor.');
                }

                await firebase.auth().signOut();
                showSuccess('✅ Conta criada com sucesso! Verifique seu e‑mail para confirmar o endereço. Após a verificação, aguarde a aprovação do administrador.');
                setTimeout(() => window.location.assign('/login'), 5000);

            } catch (error) {
                console.error('❌ Erro de registro:', error);
                let mensagem = 'Erro ao criar a conta. Tente novamente.';
                if (error.code === 'auth/email-already-in-use') {
                    mensagem = 'Este e-mail já está registado.';
                } else if (error.code === 'auth/invalid-email') {
                    mensagem = 'E-mail inválido.';
                } else if (error.code === 'auth/weak-password') {
                    mensagem = 'Senha muito fraca. Use pelo menos 6 caracteres.';
                } else if (error.message) {
                    mensagem = error.message;
                }
                showError(mensagem);
                btn.disabled = false;
                btn.textContent = 'Registar';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            successDiv.style.display = 'none';
            setTimeout(() => errorDiv.style.display = 'none', 6000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            const errorDiv = document.getElementById('errorMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            errorDiv.style.display = 'none';
        }
    </script>
</body>
</html>
